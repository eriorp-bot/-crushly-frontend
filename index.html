<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crushly - IA Dating Coach</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --bg2: #111111;
            --card: #161616;
            --border: #222222;
            --accent: #ff2d55;
            --accent2: #ff6b35;
            --text: #ffffff;
            --muted: #666666;
            --neon: 0 0 20px rgba(255,45,85,0.4);
            --neon-sm: 0 0 10px rgba(255,45,85,0.3);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            padding: 20px 16px 40px;
            max-width: 460px;
            margin: 0 auto;
            min-height: 100vh;
        }
        .header { text-align: center; padding: 28px 0 24px; }
        .logo-wrap { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 6px; }
        .logo-icon { width: 36px; height: 36px; }
        .logo-text {
            font-family: 'Rajdhani', sans-serif;
            font-size: 38px;
            font-weight: 700;
            letter-spacing: 4px;
            color: #fff;
            text-shadow: var(--neon);
        }
        .logo-text span { color: var(--accent); text-shadow: var(--neon); }
        .logo-line {
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
            margin: 6px auto 10px;
            opacity: 0.7;
        }
        .tagline { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); }
        textarea, select {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 10px;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            border-radius: 6px;
            transition: border-color 0.2s, box-shadow 0.2s;
            resize: none;
        }
        textarea:focus, select:focus { outline: none; border-color: var(--accent); box-shadow: var(--neon-sm); }
        select option { background: var(--card); }
        .coach-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
            padding: 12px 14px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
        }
        .coach-toggle input[type="checkbox"] { accent-color: var(--accent); width: 16px; height: 16px; cursor: pointer; }
        .coach-toggle label { font-size: 12px; color: var(--muted); letter-spacing: 0.5px; cursor: pointer; }
        .coach-toggle label span { color: var(--accent); }
        #btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white;
            border: none;
            border-radius: 6px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 16px;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: box-shadow 0.2s, transform 0.1s;
        }
        #btn:hover { box-shadow: var(--neon); transform: translateY(-1px); }
        #btn:active { transform: translateY(0); }
        #btn:disabled { background: #2a2a2a; color: #444; cursor: not-allowed; box-shadow: none; transform: none; }
        #loading {
            text-align: center;
            margin-top: 20px;
            color: var(--accent);
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            animation: pulse 1.4s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
        .response-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            border-radius: 6px;
            padding: 16px;
            margin-top: 12px;
            animation: fadeUp 0.4s ease;
        }
        .response-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .badge { font-family: 'Rajdhani', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); }
        .copy-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
        .copy-btn.copied { border-color: #30d158; color: #30d158; }
        .response-text { font-size: 14px; line-height: 1.65; color: #dddddd; }
        .coach-box {
            margin-top: 12px;
            padding: 10px 14px;
            background: rgba(255,45,85,0.05);
            border: 1px solid rgba(255,45,85,0.15);
            border-radius: 4px;
        }
        .coach-label { font-size: 10px; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; }
        .coach-text { font-size: 12px; color: #888; line-height: 1.5; }
        #email-section {
            margin-top: 20px;
            background: var(--card);
            border: 1px solid var(--accent);
            border-radius: 8px;
            padding: 24px;
            text-align: center;
        }
        #email-section h2 { font-family: 'Rajdhani', sans-serif; font-size: 20px; letter-spacing: 2px; margin-bottom: 8px; }
        #email-section p { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
        input[type="email"] {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            border-radius: 6px;
        }
        input[type="email"]:focus { outline: none; border-color: var(--accent); }
        .email-btn {
            width: 100%;
            padding: 13px;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .email-btn:hover { background: var(--accent); color: white; box-shadow: var(--neon-sm); }
        .hidden { display: none; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-wrap">
            <svg class="logo-icon" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
                <polygon points="18,2 22,14 34,14 24,22 28,34 18,26 8,34 12,22 2,14 14,14" fill="none" stroke="#ff2d55" stroke-width="2" stroke-linejoin="round"/>
                <polygon points="18,8 21,16 30,16 23,21 26,30 18,25 10,30 13,21 6,16 15,16" fill="#ff2d55" opacity="0.15"/>
                <circle cx="18" cy="18" r="3" fill="#ff6b35"/>
            </svg>
            <div class="logo-text">CRUSH<span>LY</span></div>
        </div>
        <div class="logo-line"></div>
        <div class="tagline">Your AI Dating Coach</div>
    </div>

    <textarea id="msg" rows="4" placeholder="Pegá el mensaje que recibiste..."></textarea>
    <select id="style">
        <option value="Flirty">Flirty 👄</option>
        <option value="Funny">Funny 😂</option>
        <option value="Mysterious">Mysterious 🌙</option>
        <option value="Direct">Direct 🎯</option>
        <option value="Social">Social 🤝</option>
    </select>
    <div class="coach-toggle" onclick="document.getElementById('coachMode').click()">
        <input type="checkbox" id="coachMode">
        <label for="coachMode">⚡ <span>Modo Coach</span> — explicá la psicología detrás</label>
    </div>
    <button id="btn" onclick="generar()">⚡ GENERAR RESPUESTAS</button>
    <div id="loading" class="hidden">[ Analizando mensaje... ]</div>
    <div id="responses"></div>
    <div id="email-section" class="hidden">
        <h2>SIN CREDITOS 🔒</h2>
        <p>Dejá tu correo y te damos acceso anticipado gratis.</p>
        <input type="email" id="email" placeholder="tu@email.com">
        <button class="email-btn" onclick="guardarCorreo()">Quiero acceso →</button>
    </div>

    <script>
        const API_URL = "https://crushly-backend-2ai3.onrender.com/api/generate";
        let usos = 0;
        const MAX_USOS = 3;

        async function generar() {
            if (usos >= MAX_USOS) { document.getElementById('email-section').classList.remove('hidden'); return; }
            const msg = document.getElementById('msg').value;
            const style = document.getElementById('style').value;
            const coachMode = document.getElementById('coachMode').checked;
            if (!msg.trim()) return alert("Pega un mensaje primero");
            document.getElementById('btn').disabled = true;
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('responses').innerHTML = '';
            try {
                const res = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: msg, style, naturalness: 8, language: "Español", coachMode })
                });
                const data = await res.json();
                if (data.success) {
                    const tipos = ["Segura ✅", "Atrevida 🔥", "Creativa 🧠"];
                    let html = '';
                    data.opciones.forEach((op, i) => {
                        const texto = op.respuesta || '';
                        const coach = op.coach || '';
                        html += `<div class="response-card">
                            <div class="response-header">
                                <span class="badge">${tipos[i] || 'Opcion ' + (i+1)}</span>
                                <button class="copy-btn" onclick="copiar(this, \`${texto.replace(/`/g, "'")}\`)">Copiar</button>
                            </div>
                            <div class="response-text">${texto}</div>
                            ${coachMode && coach ? `<div class="coach-box"><div class="coach-label">Por que funciona</div><div class="coach-text">${coach}</div></div>` : ''}
                        </div>`;
                    });
                    document.getElementById('responses').innerHTML = html;
                    usos++;
                    if (usos >= MAX_USOS) {
                        setTimeout(() => {
                            document.getElementById('email-section').classList.remove('hidden');
                            document.getElementById('btn').style.display = 'none';
                        }, 1000);
                    }
                } else { alert("Error: " + data.error); }
            } catch(e) {
                alert("Error de conexion. Si es la primera vez, espera 30 segundos y proba de nuevo.");
            } finally {
                document.getElementById('btn').disabled = false;
                document.getElementById('loading').classList.add('hidden');
            }
        }

        function copiar(btn, texto) {
            navigator.clipboard.writeText(texto).then(() => {
                btn.textContent = 'Copiado';
                btn.classList.add('copied');
                setTimeout(() => { btn.textContent = 'Copiar'; btn.classList.remove('copied'); }, 2000);
            });
        }

        function guardarCorreo() {
            const email = document.getElementById('email').value;
            if (!email.includes("@")) return alert("Pone un correo valido");
            document.getElementById('email-section').innerHTML = "<p style='color:#ff2d55; font-family:Rajdhani,sans-serif; font-size:16px; letter-spacing:2px; font-weight:700;'>REGISTRADO. TE AVISAMOS PRONTO.</p>";
        }
    </script>
</body>
</html>
